<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>周期ノート</title>

  <!-- PWA manifest (standalone = アドレスバー非表示) -->
  <link rel="manifest" href="./manifest.json"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="周期ノート"/>
  <meta name="theme-color" content="#f9a8d4"/>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"/>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: linear-gradient(160deg,#fdf2ee 0%,#fce8f3 50%,#eef3fc 100%); min-height: 100vh; font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif; }
    input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; }
    textarea { font-family: monospace; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ─── localStorage helpers (完全オフライン・端末内保存) ──────────
    const STORAGE_KEY  = "cycle-tracker-records";
    const SETTINGS_KEY = "cycle-tracker-settings";
    const DEFAULT_SETTINGS = { minCycle: 15, maxCycle: 50 };

    const SEX_KEY = "cycle-tracker-sex";
    function loadRecords()  { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)  || "[]"); } catch { return []; } }
    function saveRecords(r) { localStorage.setItem(STORAGE_KEY,  JSON.stringify(r)); }
    function loadSettings() { try { return { ...DEFAULT_SETTINGS, ...JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}") }; } catch { return { ...DEFAULT_SETTINGS }; } }
    function saveSettings(s){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }
    function loadSexDates()  { try { return new Set(JSON.parse(localStorage.getItem(SEX_KEY) || "[]")); } catch { return new Set(); } }
    function saveSexDates(s) { localStorage.setItem(SEX_KEY, JSON.stringify([...s])); }

    // ─── 日付ユーティリティ ─────────────────────────────────────────
    const toISO    = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const fromISO  = s => new Date(s+"T00:00:00");
    const addDays  = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
    const diffDays = (a,b) => Math.round((b-a)/86400000);

    function getRawCycles(records) {
      const pr = records.filter(r=>!r.memoOnly);
      if (pr.length < 2) return [];
      const sorted = [...pr].sort((a,b)=>a.start.localeCompare(b.start));
      return sorted.slice(1).map((r,i) => ({
        len: diffDays(fromISO(sorted[i].start), fromISO(r.start)),
        fromDate: sorted[i].start,
        toDate: r.start,
      }));
    }

    function calcStats(records, {minCycle, maxCycle}) {
      const pr = records.filter(r=>!r.memoOnly);
      if (pr.length < 2) return null;
      const allCycles = getRawCycles(pr);
      const valid   = allCycles.filter(c => c.len > minCycle && c.len < maxCycle);
      const skipped = allCycles.filter(c => c.len <= minCycle || c.len >= maxCycle);
      if (valid.length === 0) return { avgCycle:null, avgPeriod:null, allCycles, valid, skipped };
      const avgCycle = Math.round(valid.reduce((a,c)=>a+c.len,0)/valid.length);
      const sorted = [...pr].sort((a,b)=>a.start.localeCompare(b.start));
      const pLens  = sorted.filter(r=>r.end).map(r=>diffDays(fromISO(r.start),fromISO(r.end))+1);
      const avgPeriod = pLens.length ? Math.round(pLens.reduce((a,b)=>a+b,0)/pLens.length) : null;
      return { avgCycle, avgPeriod, allCycles, valid, skipped };
    }

    function calcPredictions(records, settings) {
      const pr = records.filter(r=>!r.memoOnly);
      if (!pr.length) return null;
      const sorted = [...pr].sort((a,b)=>b.start.localeCompare(a.start));
      const stats  = calcStats(pr, settings);
      if (!stats?.avgCycle) return null;
      const lastStart    = fromISO(sorted[0].start);
      const nextStart    = addDays(lastStart, stats.avgCycle);
      const ovulationDay = addDays(nextStart, -14);
      return {
        nextStart,
        nextEnd:      addDays(nextStart, (stats.avgPeriod??5)-1),
        ovulationDay,
        fertileStart: addDays(ovulationDay,-3),
        fertileEnd:   addDays(ovulationDay, 1),
        cycleLen:     stats.avgCycle,
        periodLen:    stats.avgPeriod??5,
      };
    }

    const getDaysInMonth     = (y,m) => new Date(y,m+1,0).getDate();
    const getFirstDayOfMonth = (y,m) => new Date(y,m,1).getDay();
    const MONTH_JA = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
    const DOW_JA   = ["日","月","火","水","木","金","土"];

    // ─── Badge ──────────────────────────────────────────────────────
    function Badge({color,children}) {
      const s = {
        period:    {background:"#ffe4e6",color:"#be123c",border:"1px solid #fecdd3"},
        fertile:   {background:"#f0fdfa",color:"#0f766e",border:"1px solid #99f6e4"},
        ovulation: {background:"#fef3c7",color:"#92400e",border:"1px solid #fde68a"},
        predicted: {background:"#fdf2f8",color:"#9d174d",border:"1px solid #fbcfe8"},
        skipped:   {background:"#f3f4f6",color:"#6b7280",border:"1px solid #e5e7eb"},
        memo:      {background:"#f5f3ff",color:"#7c3aed",border:"1px solid #ddd6fe"},
      };
      return <span style={{...s[color]||{},fontSize:"11px",padding:"2px 8px",borderRadius:"999px",fontWeight:600}}>{children}</span>;
    }

    // ─── Settings / Backup Panel ────────────────────────────────────
    function SettingsPanel({settings, records, sexDates, onSave, onRestore, onClose}) {
      const [min, setMin]           = useState(String(settings.minCycle));
      const [max, setMax]           = useState(String(settings.maxCycle));
      const [err, setErr]           = useState("");
      const [backupView, setBV]     = useState(null);
      const [importText, setIT]     = useState("");
      const [importErr,  setIE]     = useState("");
      const [importOk,   setIO]     = useState("");

      const handleSave = () => {
        const mn=parseInt(min), mx=parseInt(max);
        if(isNaN(mn)||isNaN(mx)||mn<1||mx<1){setErr("1以上の整数を入力してください");return;}
        if(mn>=mx){setErr("下限は上限より小さくしてください");return;}
        onSave({minCycle:mn,maxCycle:mx});
      };

      // ファイルダウンロード（本物のブラウザなので動作する）
      const handleExport = () => {
        const payload = JSON.stringify({version:1,exportedAt:new Date().toISOString(),records,settings,sexDates:[...sexDates]},null,2);
        const blob = new Blob([payload],{type:"application/json"});
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href     = url;
        a.download = `周期ノート_${toISO(new Date())}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      // ファイル選択でインポート
      const handleFileImport = (e) => {
        setIE(""); setIO("");
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!Array.isArray(data.records)) throw new Error("形式が正しくありません");
            data.records.forEach(r=>{ if(!r.start) throw new Error("不正なデータが含まれています"); });
            onRestore(data.records, data.settings||settings, data.sexDates||[]);
            setIO(`✓ ${data.records.length}件の記録を復元しました`);
          } catch(err) { setIE("読み込み失敗："+err.message); }
        };
        reader.readAsText(file);
        e.target.value="";
      };

      // テキスト貼り付けでインポート
      const handlePasteImport = () => {
        setIE(""); setIO("");
        try {
          const data = JSON.parse(importText);
          if (!Array.isArray(data.records)) throw new Error("形式が正しくありません");
          data.records.forEach(r=>{ if(!r.start) throw new Error("不正なデータが含まれています"); });
          onRestore(data.records, data.settings||settings, data.sexDates||[]);
          setIO(`✓ ${data.records.length}件の記録を復元しました`);
          setIT("");
        } catch(e) { setIE("読み込み失敗："+e.message); }
      };

      const inputStyle = {borderRadius:"12px",padding:"10px 16px",fontSize:"14px",
        border:"1.5px solid #fda4af",outline:"none",color:"#7c3a5a",width:"100%",background:"#fff"};
      const btnPrimary = {borderRadius:"12px",padding:"10px 0",fontSize:"14px",fontWeight:700,
        background:"linear-gradient(135deg,#f9a8d4,#fda4af)",color:"#7c2d43",border:"none",
        width:"100%",cursor:"pointer"};
      const btnGhost = {borderRadius:"12px",padding:"10px 0",fontSize:"14px",fontWeight:600,
        background:"rgba(0,0,0,0.05)",color:"#9ca3af",border:"none",width:"100%",cursor:"pointer"};

      if (backupView==="import") return (
        <div>
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"20px"}}>
            <button onClick={()=>{setBV(null);setIE("");setIO("");setIT("");}}
              style={{background:"none",border:"none",color:"#c084a0",fontSize:"22px",cursor:"pointer",lineHeight:1}}>‹</button>
            <h2 style={{color:"#7c3a5a",fontSize:"16px",fontWeight:700,margin:0}}>インポート 📥</h2>
          </div>
          <p style={{fontSize:"12px",color:"#9ca3af",lineHeight:1.6,marginBottom:"12px"}}>
            ① JSONファイルを直接選択するか<br/>② バックアップテキストを貼り付けてください。
          </p>
          <p style={{fontSize:"12px",color:"#f43f5e",fontWeight:600,marginBottom:"16px"}}>
            ⚠ 現在のデータはすべて上書きされます
          </p>

          {/* ファイル選択 */}
          <label style={{display:"block",borderRadius:"12px",padding:"10px",fontSize:"13px",
            fontWeight:700,textAlign:"center",cursor:"pointer",marginBottom:"12px",
            background:"rgba(255,255,255,0.9)",color:"#9f4e72",border:"1.5px solid #fda4af"}}>
            📂 JSONファイルを選択
            <input type="file" accept=".json,application/json" onChange={handleFileImport} style={{display:"none"}}/>
          </label>

          <p style={{fontSize:"11px",color:"#c084a0",textAlign:"center",margin:"0 0 8px"}}>または</p>

          {/* テキスト貼り付け */}
          <textarea value={importText} onChange={e=>{setIT(e.target.value);setIE("");setIO("");}}
            rows={5} placeholder='{"version":1,"records":[...]...} を貼り付け'
            style={{...inputStyle,resize:"none",fontFamily:"monospace",fontSize:"11px",
              background:"rgba(249,168,212,0.05)",marginBottom:"8px"}}/>

          {importErr && <p style={{fontSize:"12px",color:"#f43f5e",marginBottom:"8px"}}>{importErr}</p>}
          {importOk  && <p style={{fontSize:"12px",color:"#10b981",marginBottom:"8px"}}>{importOk}</p>}

          <button onClick={handlePasteImport} disabled={!importText.trim()}
            style={{...btnPrimary,opacity:importText.trim()?1:0.5}}>テキストから復元する</button>
        </div>
      );

      return (
        <div>
          <h2 style={{color:"#7c3a5a",fontSize:"16px",fontWeight:700,marginBottom:"20px"}}>設定 ⚙️</h2>

          {/* Backup */}
          <p style={{fontSize:"12px",fontWeight:700,color:"#c084a0",marginBottom:"8px"}}>📦 バックアップ</p>
          <div style={{background:"rgba(249,168,212,0.08)",border:"1px solid rgba(249,168,212,0.2)",
            borderRadius:"16px",padding:"16px",marginBottom:"20px",display:"flex",flexDirection:"column",gap:"8px"}}>
            <button onClick={handleExport} style={btnPrimary}>⬇ エクスポート（JSONファイルを保存）</button>
            <button onClick={()=>setBV("import")}
              style={{...btnGhost,color:"#9f4e72",border:"1.5px solid #fda4af",background:"rgba(255,255,255,0.8)"}}>
              ⬆ インポート（バックアップから復元）
            </button>
          </div>

          {/* Filter */}
          <p style={{fontSize:"12px",fontWeight:700,color:"#c084a0",marginBottom:"8px"}}>🚫 外れ値フィルター</p>
          <p style={{fontSize:"12px",color:"#9ca3af",lineHeight:1.6,marginBottom:"16px"}}>
            設定した日数以下・以上の周期は統計・予測から除外されます。記録は削除されません。
          </p>
          <div style={{display:"flex",flexDirection:"column",gap:"12px",marginBottom:"8px"}}>
            <div>
              <label style={{fontSize:"12px",fontWeight:700,color:"#c084a0",display:"block",marginBottom:"6px"}}>
                下限（この日数以下の周期を除外）
              </label>
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                <input type="number" min="1" max="29" value={min} onChange={e=>setMin(e.target.value)}
                  style={{...inputStyle,width:"80px",textAlign:"center",fontWeight:700}}/>
                <span style={{fontSize:"13px",color:"#c084a0"}}>日以下を除外</span>
              </div>
            </div>
            <div>
              <label style={{fontSize:"12px",fontWeight:700,color:"#c084a0",display:"block",marginBottom:"6px"}}>
                上限（この日数以上の周期を除外）
              </label>
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                <input type="number" min="30" max="365" value={max} onChange={e=>setMax(e.target.value)}
                  style={{...inputStyle,width:"80px",textAlign:"center",fontWeight:700}}/>
                <span style={{fontSize:"13px",color:"#c084a0"}}>日以上を除外</span>
              </div>
            </div>
          </div>
          {err && <p style={{fontSize:"12px",color:"#f43f5e",marginBottom:"8px"}}>{err}</p>}
          <div style={{background:"rgba(249,168,212,0.1)",borderRadius:"12px",padding:"10px",marginBottom:"20px"}}>
            <p style={{fontSize:"12px",color:"#c084a0",margin:0}}>
              現在：<strong style={{color:"#7c3a5a"}}>{min}日以下</strong>と
              <strong style={{color:"#7c3a5a"}}>{max}日以上</strong>を除外
            </p>
          </div>
          <div style={{display:"flex",gap:"10px"}}>
            <button onClick={onClose} style={{...btnGhost,flex:1}}>キャンセル</button>
            <button onClick={handleSave} style={{...btnPrimary,flex:1}}>保存</button>
          </div>
        </div>
      );
    }

    // ─── Main App ───────────────────────────────────────────────────
    function App() {
      const [records,     setRecords]     = useState(()=>loadRecords());
      const [settings,    setSettings]    = useState(()=>loadSettings());
      const [tab,         setTab]         = useState("calendar");
      const [calYear,     setCalYear]     = useState(()=>new Date().getFullYear());
      const [calMonth,    setCalMonth]    = useState(()=>new Date().getMonth());
      const [selectedDay, setSelectedDay] = useState(null);
      const [modal,       setModal]       = useState(null);
      const [form,        setForm]        = useState({start:"",end:"",note:"",memoOnly:false});
      const [toast,       setToast]       = useState(null);
      const [sexDates,    setSexDates]    = useState(()=>loadSexDates());
      const [deleteConfirm, setDeleteConfirm] = useState(false);
      const [guideHidden, setGuideHidden] = useState(()=>!!localStorage.getItem("cycle-guide-hidden"));
      const hideGuide = () => { localStorage.setItem("cycle-guide-hidden","1"); setGuideHidden(true); };
      useEffect(()=>{setDeleteConfirm(false);},[modal]);

      const showToast = (msg,type="ok") => {
        setToast({msg,type}); setTimeout(()=>setToast(null),2500);
      };

      const handleSaveSettings = s => { saveSettings(s); setSettings(s); setModal(null); showToast("設定を保存しました ✓"); };
      const handleRestore = (rs, rs2, sd) => {
        saveRecords(rs); saveSettings(rs2); setRecords(rs); setSettings(rs2);
        const s=new Set(sd||[]); saveSexDates(s); setSexDates(s);
      };

      const stats = calcStats(records, settings);
      const preds = calcPredictions(records, settings);

      const tagMap = useCallback(()=>{
        const map={};
        const tag=(iso,t)=>{ if(!map[iso])map[iso]=new Set(); map[iso].add(t); };
        records.forEach(r=>{
          if(r.memoOnly){tag(r.start,"memo");return;}
          let d=fromISO(r.start); const end=r.end?fromISO(r.end):fromISO(r.start);
          while(d<=end){tag(toISO(d),"period");d=addDays(d,1);}
        });
        sexDates.forEach(iso=>tag(iso,"sex"));
        if(preds){
          let d=new Date(preds.nextStart); while(d<=preds.nextEnd){tag(toISO(d),"predicted");d=addDays(d,1);}
          d=new Date(preds.fertileStart); while(d<=preds.fertileEnd){tag(toISO(d),"fertile");d=addDays(d,1);}
          tag(toISO(preds.ovulationDay),"ovulation");
        }
        return map;
      },[records,preds,sexDates])();

      const handleDayClick = iso => {
        setSelectedDay(iso);
        const ex   = records.find(r=>!r.memoOnly&&r.start<=iso&&(r.end?r.end>=iso:r.start===iso));
        const memo = records.find(r=>r.memoOnly&&r.start===iso);
        if(ex||memo){ setModal("view"); return; }
        const latestPeriod=[...records].filter(r=>!r.memoOnly).sort((a,b)=>b.start.localeCompare(a.start))[0];
        if(latestPeriod&&!latestPeriod.end&&latestPeriod.start<iso){
          setForm({...latestPeriod,end:iso});
        } else {
          setForm({start:iso,end:"",note:"",memoOnly:false});
        }
        setModal("add");
      };

      const handleSave = () => {
        if(form.memoOnly){
          if(!form.note?.trim())return;
          const updated=[...records.filter(r=>r.id!==form.id)];
          updated.push({id:form.id||Date.now().toString(),start:form.start||selectedDay||today,end:null,note:form.note,memoOnly:true});
          saveRecords(updated); setRecords(updated); setModal(null);
          showToast("メモを保存しました ✓");
        } else {
          if(!form.start)return;
          if(!form.id && records.some(r=>!r.memoOnly&&!r.end)){
            showToast("終了日が未入力の記録があります","warn"); return;
          }
          const updated=[...records.filter(r=>r.id!==form.id)];
          updated.push({id:form.id||Date.now().toString(),start:form.start,end:form.end||null,note:form.note});
          saveRecords(updated); setRecords(updated); setModal(null);
          showToast("記録を保存しました ✓");
        }
      };

      const handleDelete = id => {
        const updated=records.filter(r=>r.id!==id);
        saveRecords(updated); setRecords(updated); setModal(null);
        showToast("削除しました","warn");
      };

      const toggleSex = iso => {
        const updated=new Set(sexDates);
        if(updated.has(iso)) updated.delete(iso); else updated.add(iso);
        saveSexDates(updated); setSexDates(updated);
      };

      const today=toISO(new Date());
      const prevMonth=()=>{if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1);};
      const nextMonth=()=>{if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1);};

      // ── styles ──
      const card = {background:"rgba(255,255,255,0.85)",borderRadius:"20px",padding:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"};
      const inputStyle = {borderRadius:"12px",padding:"10px 16px",fontSize:"14px",
        border:"1.5px solid #fda4af",outline:"none",color:"#7c3a5a",width:"100%",background:"#fff"};
      const btnPrimary = {borderRadius:"12px",padding:"10px 0",fontSize:"14px",fontWeight:700,
        background:"linear-gradient(135deg,#f9a8d4,#fda4af)",color:"#7c2d43",border:"none",cursor:"pointer"};
      const btnGhost = {borderRadius:"12px",padding:"10px 0",fontSize:"14px",fontWeight:600,
        background:"rgba(0,0,0,0.05)",color:"#9ca3af",border:"none",cursor:"pointer"};

      return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",
          fontFamily:"'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif",
          background:"linear-gradient(160deg,#fdf2ee 0%,#fce8f3 50%,#eef3fc 100%)"}}>

          {/* Header */}
          <header style={{padding:"28px 20px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",gap:"12px",alignItems:"center"}}>
              <div style={{width:42,height:42,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:22,background:"linear-gradient(135deg,#f9a8d4,#fda4af)"}}>🌸</div>
              <div>
                <h1 style={{color:"#7c3a5a",fontSize:"20px",fontWeight:700,margin:0,letterSpacing:"0.02em"}}>周期ノート</h1>
                <p style={{color:"#c084a0",fontSize:"11px",margin:0}}>あなただけの記録</p>
              </div>
            </div>
            <button onClick={()=>setModal("settings")} style={{width:38,height:38,borderRadius:14,
              border:"none",background:"rgba(255,255,255,0.7)",fontSize:18,cursor:"pointer",color:"#c084a0"}}>⚙️</button>
          </header>

          {/* Prediction card */}
          {preds ? (
            <div style={{margin:"0 16px 16px",borderRadius:20,padding:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",
              background:"linear-gradient(135deg,rgba(255,255,255,0.9),rgba(255,240,248,0.9))",
              border:"1px solid rgba(249,168,212,0.3)"}}>
              <p style={{fontSize:"11px",fontWeight:700,color:"#c084a0",marginBottom:"10px"}}>次回の予測</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                <div style={{borderRadius:14,padding:"12px",background:"rgba(253,164,175,0.15)"}}>
                  <p style={{fontSize:"11px",color:"#9f4e72",margin:"0 0 4px"}}>🩸 生理開始予定</p>

                        {!form.memoOnly && !form.id && records.some(r=>!r.memoOnly&&!r.end) && (()=>{
                          const og=records.find(r=>!r.memoOnly&&!r.end);
                          return <div style={{borderRadius:12,padding:"12px",marginBottom:"4px",
                            background:"rgba(251,113,133,0.08)",border:"1px solid rgba(251,113,133,0.25)"}}>
                            <p style={{fontSize:"12px",color:"#f43f5e",margin:0,lineHeight:1.6}}>
                              ⚠ {fromISO(og.start).getMonth()+1}月{fromISO(og.start).getDate()}日開始の記録に終了日が未入力です。先に終了日を入力してください。
                            </p>
                          </div>;
                        })()}
                        <div style={{display:"flex",flexDirection:"column",gap:"14px",marginBottom:"8px"}}>
                          {!form.memoOnly && (
                            <>
                              <div>
                                <label style={{fontSize:"12px",fontWeight:700,color:"#c084a0",display:"block",marginBottom:"6px"}}>開始日</label>
                                <input type="date" value={form.start} onChange={e=>setForm(f=>({...f,start:e.target.value}))} style={inputStyle}/>
                              </div>
                              <div>
                                <label style={{fontSize:"12px",fontWeight:700,color:"#c084a0",display:"block",marginBottom:"6px"}}>終了日（省略可）</label>
                                <input type="date" value={form.end||""} onChange={e=>setForm(f=>({...f,end:e.target.value}))} style={inputStyle}/>
                              </div>
                            </>
                          )}
                          {form.memoOnly && (
                            <div>
                              <label style={{fontSize:"12px",fontWeight:700,color:"#8b5cf6",display:"block",marginBottom:"6px"}}>日付</label>
                              <input type="date" value={form.start} onChange={e=>setForm(f=>({...f,start:e.target.value}))} style={{...inputStyle,borderColor:"#c4b5fd"}}/>
                            </div>
                          )}
                          <div>
                            <label style={{fontSize:"12px",fontWeight:700,display:"block",marginBottom:"6px",
                              color:form.memoOnly?"#8b5cf6":"#c084a0"}}>
                              メモ{form.memoOnly?"":" （省略可）"}</label>
                            <textarea value={form.note||""} onChange={e=>setForm(f=>({...f,note:e.target.value}))}
                              rows={form.memoOnly?3:2} placeholder="体調や気分など..."
                              style={{...inputStyle,resize:"none",fontFamily:"inherit",
                                borderColor:form.memoOnly?"#c4b5fd":"#fda4af"}}/>
                          </div>
                        </div>
                        {form.start && (()=>{
                          const sexKey=form.start; const hasSex=sexDates.has(sexKey);
                          return (
                            <button onClick={()=>toggleSex(sexKey)}
                              style={{width:"100%",background:"none",border:"none",cursor:"pointer",
                                borderTop:"1px solid rgba(249,168,212,0.2)",paddingTop:"12px",marginTop:"8px",marginBottom:"4px",
                                display:"flex",alignItems:"center",gap:"8px",textAlign:"left"}}>
                              <span style={{fontSize:"15px",lineHeight:1}}>{hasSex?"❤️":"🤍"}</span>
                              <span style={{fontSize:"13px",color:hasSex?"#f43f5e":"#c084a0",fontWeight:hasSex?600:400}}>
                                セックスした
                              </span>
                              {hasSex&&<span style={{marginLeft:"auto",fontSize:"11px",color:"#f43f5e",fontWeight:700}}>✓</span>}
                            </button>
                          );
                        })()}
                        <div style={{display:"flex",gap:"10px",marginTop:"12px"}}>
                          {form.id && (records.find(r=>r.id===form.id)?.end || !form.end) && (
                            <button onClick={()=>form.memoOnly ? handleDelete(form.id) : setDeleteConfirm(true)}
                              style={{padding:"10px 16px",borderRadius:12,border:"none",cursor:"pointer",
                                background:"rgba(251,113,133,0.1)",color:"#f43f5e",fontSize:"13px",fontWeight:600}}>削除</button>
                          )}
                          <button onClick={()=>setModal(null)} style={{...btnGhost,flex:1}}>キャンセル</button>
                          <button onClick={handleSave}
                            disabled={form.memoOnly ? !form.note?.trim() : (!form.start || (!form.id&&records.some(r=>!r.memoOnly&&!r.end)))}
                            style={{...btnPrimary,flex:1,
                              background:form.memoOnly?"linear-gradient(135deg,#c4b5fd,#8b5cf6)":"linear-gradient(135deg,#f9a8d4,#fda4af)",
                              opacity:(form.memoOnly ? form.note?.trim() : (form.start&&(form.id||!records.some(r=>!r.memoOnly&&!r.end))))?1:0.5}}>保存</button>
                        </div>
                      </>
                    )}
                  </div>
                )}

                {modal==="view" && selectedDay && (()=>{
                  const rec=records.find(r=>!r.memoOnly&&r.start<=selectedDay&&(r.end?r.end>=selectedDay:r.start===selectedDay));
                  const memoRec=records.find(r=>r.memoOnly&&r.start===selectedDay);
                  const tags=tagMap[selectedDay]||new Set();
                  const hasSex=sexDates.has(selectedDay);
                  const latestPeriod=[...records].filter(r=>!r.memoOnly).sort((a,b)=>b.start.localeCompare(a.start))[0];
                  const isAfterOngoing=latestPeriod&&!latestPeriod.end&&latestPeriod.start<selectedDay;
                  return (
                    <div>
                      <h2 style={{color:"#7c3a5a",fontSize:"16px",fontWeight:700,marginBottom:"14px"}}>
                        {fromISO(selectedDay).getMonth()+1}月{fromISO(selectedDay).getDate()}日
                      </h2>
                      <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"14px"}}>
                        {tags.has("period")    && <Badge color="period">🩸 生理中</Badge>}
                        {tags.has("predicted") && <Badge color="predicted">🌸 生理予測日</Badge>}
                        {tags.has("fertile")   && <Badge color="fertile">🌿 妊娠しやすい日</Badge>}
                        {tags.has("ovulation") && <Badge color="ovulation">✨ 排卵日予測</Badge>}
                        {tags.has("memo")      && <Badge color="memo">📝 メモ</Badge>}
                      </div>
                      {rec && (
                        <div style={{borderRadius:12,padding:"12px",marginBottom:"14px",
                          background:"rgba(249,168,212,0.1)"}}>
                          <p style={{fontSize:"11px",fontWeight:700,color:"#c084a0",margin:"0 0 4px"}}>🩸 生理記録</p>
                          <p style={{fontSize:"13px",color:"#7c3a5a",margin:0}}>{rec.start}{rec.end?` 〜 ${rec.end}`:""}</p>
                          {rec.note&&<p style={{fontSize:"11px",color:"#9ca3af",fontStyle:"italic",margin:"4px 0 0"}}>{rec.note}</p>}
                        </div>
                      )}
                      {memoRec && (
                        <div style={{borderRadius:12,padding:"12px",marginBottom:"14px",
                          background:"rgba(167,139,250,0.08)"}}>
                          <p style={{fontSize:"11px",fontWeight:700,color:"#8b5cf6",margin:"0 0 4px"}}>📝 メモ</p>
                          <p style={{fontSize:"11px",color:"#9ca3af",fontStyle:"italic",margin:0}}>{memoRec.note}</p>
                        </div>
                      )}
                      <button onClick={()=>toggleSex(selectedDay)}
                        style={{width:"100%",background:"none",border:"none",cursor:"pointer",
                          borderTop:"1px solid rgba(249,168,212,0.2)",paddingTop:"12px",marginBottom:"14px",
                          display:"flex",alignItems:"center",gap:"8px",textAlign:"left"}}>
                        <span style={{fontSize:"15px",lineHeight:1}}>{hasSex?"❤️":"🤍"}</span>
                        <span style={{fontSize:"13px",color:hasSex?"#f43f5e":"#c084a0",fontWeight:hasSex?600:400}}>
                          セックスした
                        </span>
                        {hasSex && <span style={{marginLeft:"auto",fontSize:"11px",color:"#f43f5e",fontWeight:700}}>✓</span>}
                      </button>
                      <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
                        {rec && <button onClick={()=>{setForm({...rec,memoOnly:false});setModal("add");}}
                          style={{flex:1,...btnGhost,color:"#9f4e72",background:"rgba(249,168,212,0.2)"}}>編集</button>}
                        {rec && !memoRec && <button onClick={()=>{setForm({start:selectedDay,end:"",note:"",memoOnly:true});setModal("add");}}
                          style={{flex:1,...btnGhost,color:"#7c3aed",background:"rgba(139,92,246,0.1)"}}>📝 メモ追加</button>}
                        {memoRec && <button onClick={()=>{setForm({...memoRec});setModal("add");}}
                          style={{flex:1,...btnGhost,color:"#7c3aed",background:"rgba(139,92,246,0.1)"}}>メモ編集</button>}
                        <button onClick={()=>setModal(null)} style={{...btnGhost,flex:1}}>閉じる</button>
                        {!rec && isAfterOngoing && <button onClick={()=>{setForm({...latestPeriod,end:selectedDay});setModal("add");}}
                          style={{...btnPrimary,flex:1}}>終了日を設定</button>}
                        {!rec && !isAfterOngoing && <button onClick={()=>{setForm({start:selectedDay,end:"",note:"",memoOnly:false});setModal("add");}}
                          style={{...btnPrimary,flex:1}}>生理を記録する</button>}
                      </div>
                    </div>
                  );
                })()}
              </div>
            </div>
          )}

          {/* Toast */}
          {toast && (
            <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",
              padding:"10px 20px",borderRadius:999,fontSize:"13px",fontWeight:700,
              boxShadow:"0 2px 12px rgba(0,0,0,0.15)",zIndex:100,whiteSpace:"nowrap",
              background:toast.type==="warn"?"rgba(251,113,133,0.95)":"rgba(52,211,153,0.95)",
              color:"#fff"}}>
              {toast.msg}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

  <!-- サービスワーカー登録（アドレスバー非表示に必要） -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
